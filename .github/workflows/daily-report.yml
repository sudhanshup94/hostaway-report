name: Hostaway Daily Report

on:
  schedule:
    - cron: '30 12 * * *'  # 12:30 UTC = 6:00 PM IST
  workflow_dispatch:  # Allows manual trigger

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Hostaway Report
        env:
          HOSTAWAY_ACCOUNT_ID: ${{ secrets.HOSTAWAY_ACCOUNT_ID }}
          HOSTAWAY_API_KEY: ${{ secrets.HOSTAWAY_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_SENDER: ${{ secrets.RESEND_SENDER }}
          RESEND_RECIPIENT: ${{ secrets.RESEND_RECIPIENT }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          WHATSAPP_RECIPIENT: ${{ secrets.WHATSAPP_RECIPIENT }}
        run: node hostaway-report.js
